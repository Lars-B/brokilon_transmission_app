name: Build macOS App

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  UV_PYTHON: 3.12
  PYTHONUTF8: 1
  FLET_CLI_NO_RICH_OUTPUT: 1
  CI: 1

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7

      - name: Install dependencies
        run: |
          uv venv
          uv pip install flet
          uv pip install -r requirements.txt

      - name: Clean build cache
        run: rm -rf build .flet .dart_tool

      - name: Build macOS (with icon)
        run: uv run flet build macos --icon assets/brokilon.png --verbose

      - uses: actions/upload-artifact@v5
        with:
          name: macos-build
          path: build/macos